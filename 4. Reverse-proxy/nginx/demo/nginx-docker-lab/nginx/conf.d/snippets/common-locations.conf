add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
}

location = /status {
    stub_status;
    allow all;
}

location = /old-docs {
    return 301 /guide/rewrite.html;
}

location /static/ {
    alias /usr/share/nginx/html/static/;
    autoindex on;
    expires 1h;
    add_header Cache-Control "public";
}

location /app1/ {
    include /etc/nginx/conf.d/snippets/proxy-common.conf;
    proxy_pass http://app1:8000/;
}

location /app2/ {
    include /etc/nginx/conf.d/snippets/proxy-common.conf;
    proxy_pass http://app2:8000/;
}

location /api/ {
    include /etc/nginx/conf.d/snippets/proxy-common.conf;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_pass http://demo_backend/;
}

location /cache/ {
    include /etc/nginx/conf.d/snippets/proxy-common.conf;
    proxy_cache demo_cache;
    proxy_cache_valid 200 30s;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    add_header X-Cache-Status $upstream_cache_status always;
    proxy_pass http://demo_backend/;
}

location /rate/ {
    include /etc/nginx/conf.d/snippets/proxy-common.conf;
    limit_req zone=api_limit burst=10 nodelay;
    limit_conn conn_limit 10;
    proxy_pass http://demo_backend/;
}

location /basic/ {
    include /etc/nginx/conf.d/snippets/proxy-common.conf;
    auth_basic "Nginx Demo Area";
    auth_basic_user_file /etc/nginx/auth/.htpasswd;
    proxy_pass http://app1:8000/;
}

location /rewrite-demo/ {
    rewrite ^/rewrite-demo/(.*)$ /$1 break;
    include /etc/nginx/conf.d/snippets/proxy-common.conf;
    proxy_pass http://demo_backend;
}

location / {
    try_files $uri $uri/ /index.html;
}

error_page 404 /errors/404.html;
error_page 500 502 503 504 /errors/50x.html;

location /errors/ {
    internal;
    alias /usr/share/nginx/html/errors/;
}
